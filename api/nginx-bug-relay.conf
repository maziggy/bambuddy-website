# --- bug-report relay proxy + edge rate limiting ---------------------------
#
# 1) limit_req_zone is only valid at http {} level (not in server/location). On
#    Debian/Ubuntu the http {} block lives in /etc/nginx/nginx.conf, and the site
#    file (sites-available/) is included *inside* it -- so it can't go there.
#    Cleanest: drop a one-line file that the stock http {} include picks up:
#
#      echo 'limit_req_zone $binary_remote_addr zone=bugreport:10m rate=10r/m;' \
#        > /etc/nginx/conf.d/bug-relay-limit.conf
#
#    (Confirm the include exists first: grep -n 'include.*conf.d' /etc/nginx/nginx.conf
#     -- if it doesn't, add the limit_req_zone line directly inside http {} in
#     nginx.conf instead.) That carves a 10 MB shared-memory zone keyed on IP,
#     refilling at
#    10 requests/minute. It shields the Flask worker so a single flooding IP
#    can't drive it into the 500/502 storm we saw on Jul 6. It is per-IP, so it
#    does NOT stop IP-rotation on its own — the app's global cap does that. This
#    is the cheap first line that keeps the backend healthy under the flood.
#
# 2) Then this location block goes in the bambuddy.cool server {} block:

location /api/bug-report {
    # burst=5: allow a small spike, nodelay: serve the burst immediately then
    # throttle. Excess requests get 429 at the edge without touching gunicorn.
    limit_req zone=bugreport burst=5 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:5050;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 10m;
}
